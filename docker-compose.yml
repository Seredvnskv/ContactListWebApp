services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sqlserver
    hostname: sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "P@ssword2026"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -C"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  contactlist-api:
    build:
      context: ./ContactListWebApp
      dockerfile: Dockerfile
    container_name: contactlist-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=ContactListDb;User Id=sa;Password=P@ssword2026;TrustServerCertificate=true;Encrypt=false;"
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: contactlist-frontend
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "4200:4200"
    volumes:
      - ./Frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      contactlist-api:
        condition: service_started

volumes:
  sqlserver-data:
  frontend-node-modules:
